name: HMS Frontend Deployment

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # =========================================
      # 🚀 DEVELOP → VERCEL
      # =========================================
      - name: Setup Node.js
        if: github.ref == 'refs/heads/develop'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: github.ref == 'refs/heads/develop'
        run: npm ci

      - name: Build (with full output)
        if: github.ref == 'refs/heads/develop'
        run: npm run build 2>&1 | tee build.log || (echo "❌ Build failed. Full output:" && cat build.log && exit 1)

      - name: Deploy to Vercel (Develop)
        if: github.ref == 'refs/heads/develop'
        run: npx vercel@latest --token=${{ secrets.VERCEL_TOKEN }} --debug 2>&1 | tee vercel.log || (echo "❌ Vercel deploy failed:" && cat vercel.log && exit 1)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # =========================================
      # 🖥️ MAIN → VPS (NGINX)
      # =========================================
      - name: Deploy Frontend to VPS
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "🚀 Starting frontend deployment..."

            cd /root/HMS.Frontend

            git fetch https://${{ secrets.GH_TOKEN }}@github.com/ClassicalAitem/HMS.Frontend.git main
            git reset --hard FETCH_HEAD

            rm -rf .env
            cp ../.env .env

            npm install
            npm run build 2>&1 | tee /tmp/hms-build.log || (echo "❌ Build failed:" && cat /tmp/hms-build.log && exit 1)

            rm -rf /var/www/hms-frontend/*
            cp -r dist/* /var/www/hms-frontend/

            chown -R www-data:www-data /var/www/hms-frontend
            chmod -R 755 /var/www/hms-frontend

            systemctl reload nginx

            echo "✅ Frontend deployed successfully"