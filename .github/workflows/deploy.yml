name: HMS Frontend Deployment

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # =========================================
      # 🚀 DEVELOP → VERCEL
      # =========================================
      - name: Deploy to Vercel (Develop)
        if: github.ref == 'refs/heads/develop'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

      # =========================================
      # 🖥️ MAIN → VPS (NGINX)
      # =========================================
      - name: Deploy Frontend to VPS
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "🚀 Starting frontend deployment..."

            cd /root/HMS.Frontend

            git reset --hard
            git pull origin main

            npm install
            npm run build

            # Copy dist to nginx folder
            rm -rf /var/www/hms-frontend/*
            cp -r dist/* /var/www/hms-frontend/

            # Fix permissions
            chown -R www-data:www-data /var/www/hms-frontend
            chmod -R 755 /var/www/hms-frontend

            # Reload nginx
            systemctl reload nginx

            echo "✅ Frontend deployed successfully"